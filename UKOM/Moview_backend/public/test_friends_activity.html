<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Friends Activity API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }
        .test-section {
            background-color: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            background-color: #1a1a1a;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .activity-card {
            background-color: #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .activity-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .type-review {
            background-color: #4CAF50;
        }
        .type-diary {
            background-color: #2196F3;
        }
    </style>
</head>
<body>
    <h1>Test Friends Activity API</h1>
    
    <div class="test-section">
        <h2>Test API Endpoint</h2>
        <label for="userId">User ID:</label>
        <input type="number" id="userId" value="5" style="padding: 8px; font-size: 16px; margin: 0 10px;">
        <button onclick="testAPI()">Test API</button>
        
        <div id="result"></div>
    </div>
    
    <div id="activities"></div>

    <script>
        async function testAPI() {
            const userId = document.getElementById('userId').value;
            const resultDiv = document.getElementById('result');
            const activitiesDiv = document.getElementById('activities');
            
            resultDiv.textContent = 'Loading...';
            activitiesDiv.innerHTML = '';
            
            try {
                const response = await fetch(`http://10.0.2.2:8000/api/users/${userId}/friends-activity`);
                const data = await response.json();
                
                resultDiv.textContent = JSON.stringify(data, null, 2);
                
                if (data.success && data.data && data.data.length > 0) {
                    let html = '<h2>Activities (' + data.data.length + ')</h2>';
                    
                    data.data.forEach(activity => {
                        const typeClass = activity.activity_type === 'review' ? 'type-review' : 'type-diary';
                        html += `
                            <div class="activity-card">
                                <span class="activity-type ${typeClass}">${activity.activity_type.toUpperCase()}</span>
                                <h3>${activity.movie.title}</h3>
                                <p><strong>User:</strong> ${activity.user.username} (${activity.user.display_name || 'No display name'})</p>
                                <p><strong>Rating:</strong> ${activity.rating} ⭐</p>
                                <p><strong>Rewatch:</strong> ${activity.is_rewatched ? 'Yes' : 'No'}</p>
                                <p><strong>Has Review:</strong> ${activity.has_review ? 'Yes' : 'No'}</p>
                                <p><strong>Review ID:</strong> ${activity.review_id}</p>
                                <p><strong>Diary ID:</strong> ${activity.diary_id}</p>
                                <p><strong>Timestamp:</strong> ${new Date(activity.timestamp * 1000).toLocaleString()}</p>
                            </div>
                        `;
                    });
                    
                    activitiesDiv.innerHTML = html;
                } else {
                    activitiesDiv.innerHTML = '<p>No activities found</p>';
                }
                
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }
        
        // Auto-test on load
        window.onload = () => testAPI();
    </script>
</body>
</html>
